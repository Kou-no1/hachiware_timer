<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 ねこタイマー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink:   #FFB6C1;
    --yellow: #FFFACD;
    --blue:   #ADD8E6;
    --green:  #98FB98;
    --dark:   #3a3a3a;
    --accent: #e06080;
    --blue-btn: #6ab8e8;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(135deg, #ffd6e0 0%, var(--pink) 35%, #fff0b3 100%);
    font-family: 'Nunito', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.3) 2px, transparent 2px);
    background-size: 30px 30px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── TOP BAR ─── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px 6px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .preset-btn {
    background: #fff;
    color: var(--dark);
    border: 2.5px solid var(--dark);
    border-radius: 50px;
    padding: 6px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    box-shadow: 3px 3px 0 var(--dark);
    letter-spacing: 0.02em;
  }
  .preset-btn:hover { background: var(--yellow); transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark); }
  .preset-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--dark); }

  .clear-btn {
    background: var(--pink);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 3px 3px 0 var(--accent);
  }
  .clear-btn:hover { background: #ffccd5; box-shadow: 4px 4px 0 var(--accent); }

  /* ─── MAIN ─── */
  #main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px 4px;
    min-height: 0;
    position: relative;
    z-index: 1;
    gap: 10px;
  }

  /* ─── CAT SECTION ─── */
  #cat-section {
    flex-shrink: 0;
    position: relative;
    width: 40vh;
    height: 40vh;
    min-width: 120px;
    min-height: 120px;
  }

  #progress-ring {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
    overflow: visible;
  }

  #ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.55);
    stroke-width: 7;
  }
  #ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 7;
    stroke-linecap: round;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    transition: stroke-dashoffset 1s linear;
  }

  #cat-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 8px 20px rgba(224,96,128,0.25));
  }

  @keyframes catBounce {
    0%,100% { transform: translateY(0) rotate(-1.5deg) scale(1); }
    50%      { transform: translateY(-6px) rotate(1.5deg) scale(1.02); }
  }
  #cat-img.running { animation: catBounce 0.55s ease-in-out infinite; }

  #orbit-dot {
    position: absolute;
    width: 14px; height: 14px;
    background: var(--accent);
    border: 3px solid #fff;
    border-radius: 50%;
    z-index: 3;
    display: none;
    box-shadow: 0 2px 8px rgba(224,96,128,0.55);
    top: 0; left: 0;
  }

  /* ─── TIMER SECTION ─── */
  #timer-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-width: 0;
  }

  #timer-display {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .digit-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .adj-btn {
    background: #fff;
    border: 2.5px solid var(--dark);
    border-radius: 50%;
    width: 36px; height: 36px;
    font-family: 'Nunito', sans-serif;
    font-size: 19px;
    font-weight: 900;
    color: var(--dark);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s, transform .1s, box-shadow .1s;
    box-shadow: 2px 2px 0 var(--dark);
    line-height: 1;
    padding-bottom: 1px;
  }
  .adj-btn:hover { background: var(--blue); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--dark); }
  .adj-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--dark); }

  .digits-row { display: flex; }

  .digit {
    font-size: clamp(58px, 11.5vw, 128px);
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
    min-width: 0.58em;
    text-align: center;
    letter-spacing: -0.03em;
    text-shadow: 3px 3px 0 rgba(255,255,255,0.75);
    transition: color 0.3s;
  }
  .digit.dim { color: rgba(58,58,58,0.22); text-shadow: none; }

  .colon {
    font-size: clamp(58px, 11.5vw, 128px);
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
    margin: 0 2px;
    opacity: 0.38;
    align-self: center;
    padding-bottom: 4px;
  }

  #unit-labels {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -2px;
  }
  .unit-label {
    font-size: 11px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-align: center;
    min-width: calc(clamp(58px,11.5vw,128px) * 1.16);
  }
  .unit-sep { min-width: 24px; }

  /* ─── CONTROLS ─── */
  #controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 4px 16px 14px;
    position: relative;
    z-index: 1;
  }

  .ctrl-btn {
    border: 2.5px solid var(--dark);
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    letter-spacing: 0.04em;
    box-shadow: 3px 3px 0 var(--dark);
  }
  .ctrl-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark); }
  .ctrl-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--dark); }

  #start-btn { background: var(--blue-btn); color: var(--dark); }
  #pause-btn { background: var(--yellow); color: var(--dark); display: none; }
  #reset-btn { background: #fff; color: var(--dark); }

  /* ─── OVERLAY ─── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    backdrop-filter: blur(6px);
  }
  #overlay.show { display: flex; }

  @keyframes popIn {
    0% { transform: scale(0.4) rotate(-12deg); opacity: 0; }
    70% { transform: scale(1.1) rotate(4deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  #overlay-cat {
    width: 190px;
    animation: popIn 0.55s cubic-bezier(.34,1.56,.64,1) forwards;
    filter: drop-shadow(0 10px 28px rgba(0,0,0,0.35));
  }

  #overlay-card {
    background: #fff;
    border: 3px solid var(--dark);
    border-radius: 24px;
    padding: 20px 44px;
    text-align: center;
    animation: popIn 0.55s 0.1s cubic-bezier(.34,1.56,.64,1) both;
    box-shadow: 6px 6px 0 var(--dark);
  }
  #overlay-text {
    font-weight: 900;
    font-size: 30px;
    color: var(--dark);
  }
  #overlay-sub {
    font-size: 14px;
    color: #888;
    font-weight: 700;
    margin-top: 4px;
  }

  #dismiss-btn {
    background: var(--blue-btn);
    color: var(--dark);
    border: 2.5px solid var(--dark);
    border-radius: 50px;
    padding: 12px 44px;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    animation: popIn 0.55s 0.2s cubic-bezier(.34,1.56,.64,1) both;
    box-shadow: 4px 4px 0 var(--dark);
    transition: transform .1s, box-shadow .1s;
  }
  #dismiss-btn:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--dark); }

  @keyframes flashOverlay {
    0%,100% { background: rgba(0,0,0,0.7); }
    50% { background: rgba(255,182,193,0.55); }
  }
  #overlay.show { animation: flashOverlay 0.9s 0s 3; }

  .deco {
    position: fixed;
    font-size: 22px;
    opacity: 0.22;
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<span class="deco" style="top:10px;left:14px">🌸</span>
<span class="deco" style="top:10px;right:14px">⭐</span>
<span class="deco" style="bottom:14px;left:14px">🌿</span>
<span class="deco" style="bottom:14px;right:14px">🌸</span>

</div>

<script>
  let remaining = 0, initialTotal = 0, running = false, interval = null;

  const dH10=document.getElementById('d-h10'), dH1=document.getElementById('d-h1');
  const dM10=document.getElementById('d-m10'), dM1=document.getElementById('d-m1');
  const dS10=document.getElementById('d-s10'), dS1=document.getElementById('d-s1');
  const ringFill=document.getElementById('ring-fill');
  const catImg=document.getElementById('cat-img');
  const orbitDot=document.getElementById('orbit-dot');
  const overlay=document.getElementById('overlay');
  const startBtn=document.getElementById('start-btn');
  const pauseBtn=document.getElementById('pause-btn');

  const R=94, CIRC=2*Math.PI*R;
  ringFill.style.strokeDasharray=CIRC;
  ringFill.style.strokeDashoffset=CIRC;

  function updateDisplay(secs){
    const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=secs%60;
    dH10.textContent=Math.floor(h/10); dH1.textContent=h%10;
    dM10.textContent=Math.floor(m/10); dM1.textContent=m%10;
    dS10.textContent=Math.floor(s/10); dS1.textContent=s%10;
    const dim=h===0;
    dH10.classList.toggle('dim',dim); dH1.classList.toggle('dim',dim);
    ringFill.style.strokeDashoffset = initialTotal>0 ? CIRC*(remaining/initialTotal) : CIRC;
  }

  function getSecs(){
    const h=+dH10.textContent*10 + +dH1.textContent;
    const m=+dM10.textContent*10 + +dM1.textContent;
    const s=+dS10.textContent*10 + +dS1.textContent;
    return h*3600+m*60+s;
  }

  function adj(unit,dir){
    if(running) return;
    let c=getSecs();
    if(unit==='h') c+=dir*3600;
    if(unit==='m') c+=dir*60;
    if(unit==='s') c+=dir;
    c=Math.max(0,Math.min(c,35999));
    remaining=c; initialTotal=c; updateDisplay(c);
  }

  function setPreset(s){
    if(running) pauseTimer();
    remaining=s; initialTotal=s; updateDisplay(s);
    ringFill.style.strokeDashoffset=CIRC;
  }

  function clearTimer(){
    if(running) pauseTimer();
    remaining=0; initialTotal=0; updateDisplay(0);
    ringFill.style.strokeDashoffset=CIRC;
    catImg.classList.remove('running');
    orbitDot.style.display='none';
  }

  function startTimer(){
    if(remaining<=0) return;
    running=true;
    startBtn.style.display='none'; pauseBtn.style.display='';
    catImg.classList.add('running'); orbitDot.style.display='block';
    interval=setInterval(()=>{
      remaining--;
      updateDisplay(remaining);
      animateOrbit();
      if(remaining<=0){
        clearInterval(interval); running=false;
        catImg.classList.remove('running');
        pauseBtn.style.display='none'; startBtn.style.display='';
        playKazoo(); overlay.classList.add('show');
      }
    },1000);
  }

  function pauseTimer(){
    if(!running) return;
    running=false; clearInterval(interval);
    catImg.classList.remove('running');
    pauseBtn.style.display='none'; startBtn.style.display='';
  }

  function resetTimer(){
    pauseTimer(); remaining=initialTotal; updateDisplay(remaining);
    positionOrbitDot(0); orbitDot.style.display='none';
    ringFill.style.strokeDashoffset=CIRC;
  }

  function animateOrbit(){
    positionOrbitDot(initialTotal>0?(1-remaining/initialTotal)*360:0);
  }

  function positionOrbitDot(deg){
    const sec=document.getElementById('cat-section');
    const w=sec.offsetWidth, h=sec.offsetHeight;
    const r=Math.min(w,h)*0.5;
    const rad=(deg-90)*Math.PI/180;
    orbitDot.style.left=(w/2+r*Math.cos(rad)-7)+'px';
    orbitDot.style.top =(h/2+r*Math.sin(rad)-7)+'px';
  }

  function playKazoo(){
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,659,784,880,784,659,523].forEach((freq,i)=>{
      const t=ctx.currentTime+i*0.13;
      const osc=ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=freq;
      const lfo=ctx.createOscillator(); lfo.frequency.value=18;
      const lg=ctx.createGain(); lg.gain.value=7;
      lfo.connect(lg); lg.connect(osc.frequency);
      const bp=ctx.createBiquadFilter(); bp.type='bandpass';
      bp.frequency.value=freq*1.5; bp.Q.value=3;
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.18,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.117);
      osc.connect(bp); bp.connect(g); g.connect(ctx.destination);
      lfo.start(t); lfo.stop(t+0.13); osc.start(t); osc.stop(t+0.13);
    });
  }

  function dismissOverlay(){ overlay.classList.remove('show'); clearTimer(); }

  updateDisplay(0); positionOrbitDot(0);
</script>
</body>
